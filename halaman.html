<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Baca Novel</title>

  <style>

    body{

      background:
      linear-gradient(
        to bottom,
        #111,
        #333
      );

      color:white;

      font-family:Arial;

      padding:20px;
    }

    button{

      background:#00aa55;

      color:white;

      border:none;

      padding:10px 20px;

      border-radius:10px;

      cursor:pointer;

      margin-bottom:20px;
    }

    h1{

      margin-bottom:5px;
    }

    .penulis{

      color:#aaa;

      margin-bottom:20px;
    }

    .isi{

      background:white;

      color:black;

      padding:20px;

      border-radius:15px;

      white-space:pre-wrap;

      line-height:1.7;

      user-select:none;
    }

  </style>

</head>

<body>

<button onclick="kembali()">
⬅ Kembali
</button>

<h1 id="judul"></h1>

<p
class="penulis"
id="penulis"></p>

<div
class="isi"
id="isiNovel"></div>

<script>

document.getElementById(
  "judul"
).innerText =
localStorage.getItem(
  "judulNovel"
);

document.getElementById(
  "penulis"
).innerText =
"Penulis: " +
localStorage.getItem(
  "penulisNovel"
);

document.getElementById(
  "isiNovel"
).innerText =
localStorage.getItem(
  "isiNovel"
);

function kembali(){

  window.location.href =
  "novel.html";

}

// sedikit anti copy 😎
document.addEventListener(
  "copy",
  (e)=>{
    e.preventDefault();
  }
);

document.addEventListener(
  "contextmenu",
  (e)=>{
    e.preventDefault();
  }
);

</script>

</body>
</html>
