<!DOCTYPE html>
<html lang="id">

<head>

  <meta charset="UTF-8">

  <title>Beranda</title>

  <link rel="stylesheet" href="beranda.css">

</head>

<body>

  <!-- HEADER -->
  <div class="topbar">

    <div id="namaUser">
      👤 User
    </div>

    <button onclick="logout()">
      Logout
    </button>

  </div>

  <hr>

  <h1 class="title">
    🚀 Menu Utama
  </h1>

  <!-- MENU -->
  <div class="menu">

    <div class="card" onclick="masukNovel()">

      <h2>📖 Novel</h2>

      <p>
        Baca dan buat novel keren 😎
      </p>

    </div>

    <div class="card" onclick="masukGame()">

      <h2>🎮 Game</h2>

      <p>
        Main game seru 🔥
      </p>

    </div>

  </div>

  <!-- TOMBOL + -->
  <button
  id="btnTambah"
  onclick="tambahNovel()">

    +

  </button>

<script>

  let email =
  localStorage.getItem("email");

  let role =
  localStorage.getItem("role");

  // tampilkan nama
  document.getElementById(
    "namaUser"
  ).innerText =
  "👤 " + email;

  // tombol +
  if(role === "admin"){

    document.getElementById(
      "btnTambah"
    ).style.display = "block";

  }

  function logout(){

    localStorage.clear();

    window.location.href =
    "index.html";
  }

  function masukNovel(){

    window.location.href =
    "novel.html";
  }

  function masukGame(){

    window.location.href =
    "game.html";
  }

  function tambahNovel(){

    alert(
      "🔥 Fitur tambah novel coming soon"
    );

  }

</script>

</body>
</html>
