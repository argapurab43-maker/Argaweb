<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Beranda</title>
</head>
<body style="background:black; color:white;">

<!-- HEADER -->
<div style="display:flex; justify-content:space-between; padding:10px;">
  <div id="namaUser">👤 User</div>
  <button onclick="logout()">Logout</button>
</div>

<hr>

<h2 style="text-align:center;">Menu</h2>

<div style="text-align:center;">
  <button onclick="masukNovel()">📖 Novel</button>
  <button onclick="masukGame()">🎮 Game</button>
</div>

<!-- TOMBOL + -->
<button id="btnTambah" onclick="tambahNovel()" 
style="position:fixed; bottom:20px; right:20px; 
background:blue; color:white; font-size:24px; border:none; border-radius:50%; width:50px; height:50px; display:none;">
+
</button>

<script>
  let email = localStorage.getItem("email");
  let role = localStorage.getItem("role");

  // tampilkan nama
  document.getElementById("namaUser").innerText = "👤 " + email;

  // tampilkan tombol + hanya admin
  if (role === "admin") {
    document.getElementById("btnTambah").style.display = "block";
  }

  function logout() {
    localStorage.clear();
    window.location.href = "index.html";
  }

  function masukNovel() {
    window.location.href = "novel.html";
  }

  function masukGame() {
    window.location.href = "game.html";
  }

  function tambahNovel() {
    alert("Fitur tambah novel (next step 🔥)");
  }
</script>

</body>
</html>
