<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Novel</title>

  <link rel="stylesheet" href="novel.css">
</head>

<body>

<!-- HEADER -->
<div class="topbar">

  <h2>📖 Novel</h2>

  <div class="top-buttons">

    <button onclick="jadiPenulis()">
      ✍️ Jadi Penulis
    </button>

    <button onclick="kembali()">
      ⬅ Kembali
    </button>

  </div>

</div>

<!-- LIST NOVEL -->
<div
class="novel-container"
id="novelContainer">

</div>

<!-- BUTTON + -->
<button id="addBtn" onclick="buatNovel()">
+
</button>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
  getAuth,
  onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  collection,
  getDocs
}
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCLu1POb4qzy6yqZ9gz6xHu4u_HlJ8BMMY",
  authDomain: "argaa-web.firebaseapp.com",
  projectId: "argaa-web",
  storageBucket: "argaa-web.firebasestorage.app",
  messagingSenderId: "85804841719",
  appId: "1:85804841719:web:df2129e8586a445307f1f2"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

async function getRole(user){

  const ref =
  doc(db, "users", user.uid);

  const snap =
  await getDoc(ref);

  if(snap.exists()){

    return snap.data().role;

  }

  return "member";
}

onAuthStateChanged(auth, async (user) => {

  if(!user){

    window.location.href =
    "login.html";

    return;

  }

  let role =
  await getRole(user);

  if(
    role !== "admin" &&
    role !== "penulis"
  ){

    document
    .getElementById("addBtn")
    .style.display = "none";

  }

});

window.kembali = function(){

  window.location.href =
  "beranda.html";

}

window.jadiPenulis = function(){

  window.location.href =
  "register_penulis.html";

}

window.buatNovel = function(){

  window.location.href =
  "buat_novel.html";

}

async function loadNovels(){

  const container =
  document.getElementById(
    "novelContainer"
  );

  container.innerHTML = "";

  try{

    const querySnapshot =
    await getDocs(
      collection(db, "novels")
    );

    querySnapshot.forEach((docSnap) => {

      const novel =
      docSnap.data();

      console.log(novel);

      const card =
      document.createElement("div");

      card.className =
      "novel-card";

      card.innerHTML = `
        <h2>
          ${novel.judul}
        </h2>

        <p>
          Penulis:
          ${novel.penulis}
        </p>
      `;

      card.onclick = function(){

        localStorage.setItem(
          "judulNovel",
          novel.judul
        );

        localStorage.setItem(
          "isiNovel",
          novel.isi
        );

        localStorage.setItem(
          "penulisNovel",
          novel.penulis
        );

        window.location.href =
        "halaman.html";

      }

      container.appendChild(card);

    });

  }

  catch(error){

    console.log(error);

  }

}

loadNovels();

</script>

</body>
</html>
